<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Admin · RCRC Compuservice</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;600;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body class="auth-body">

<div class="auth-container">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <img src="assets/logo.png" alt="RCRC" class="logo-img" onerror="this.onerror=null; this.src='assets/logo-fallback.svg';">
      <div class="logo-text">Romana<br><small>COMPUSERVICE</small></div>
    </a>

    <div class="auth-header">
      <div class="auth-eyebrow">// PANEL ADMIN</div>
      <h1 class="auth-title">Iniciar <em>sesión</em></h1>
      <p class="auth-subtitle">Acceso restringido al equipo administrativo.</p>
    </div>

    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username" placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>

      <div id="errorMessage" class="auth-error" style="display: none;"></div>

      <button type="submit" id="submitBtn" class="btn btn-primary auth-submit">
        <span id="btnText">Entrar</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <a href="index.html" class="auth-back">← Volver al sitio</a>
  </div>
</div>

<!-- Supabase JS desde CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase.js"></script>
<script>
(async function() {
  // Si ya está logueado, redirigir al admin
  const user = await getCurrentUser();
  if (user) {
    window.location.href = 'admin.html';
  }
})();

const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMessage');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  submitBtn.disabled = true;
  btnText.textContent = 'Entrando...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    await signIn(email, password);
    window.location.href = 'admin.html';
  } catch (error) {
    errorMsg.textContent = traducirError(error.message);
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    btnText.textContent = 'Entrar';
  }
});

function traducirError(msg) {
  if (msg.includes('Invalid login')) return 'Email o contraseña incorrectos.';
  if (msg.includes('Email not confirmed')) return 'Email no confirmado. Contacta al administrador.';
  if (msg.includes('rate limit')) return 'Demasiados intentos. Espera un minuto.';
  return 'Error: ' + msg;
}
</script>
</body>
</html>
